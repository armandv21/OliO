<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OPES — Optimisation de Portefeuille</title>

<!-- CDN dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<!-- CSS modules — order matters -->
<link rel="stylesheet" href="styles/variables.css"/>
<link rel="stylesheet" href="styles/base.css"/>
<link rel="stylesheet" href="styles/layout.css"/>
<link rel="stylesheet" href="styles/sidebar.css"/>
<link rel="stylesheet" href="styles/cards.css"/>
<link rel="stylesheet" href="styles/panels.css"/>
<link rel="stylesheet" href="styles/auth.css"/>
<link rel="stylesheet" href="styles/profile.css"/>
<link rel="stylesheet" href="styles/contact.css"/>
<link rel="stylesheet" href="styles/responsive.css"/>
</head>
<body>


<!-- Auth check inline — avant tout rendu -->

<div id="authOverlay" class="auth-overlay">
  <div class="auth-box">
    <h2 style="text-align:center; margin-bottom:1.5rem; font-family:var(--font-serif); font-size:1.45rem; font-weight:700; line-height:1.2; background:linear-gradient(135deg,#1e3a5f 0%,#3466a0 50%,#1a5c52 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">
      OPES
    </h2>
    
    <div id="authError" class="auth-error"></div>
    
    <div id="loginView">
      <div class="auth-field">
        <label for="loginEmail">Email</label>
        <input type="text" id="loginEmail" class="auth-input" placeholder="Email ou Pseudo" />
      </div>
      <div class="auth-field">
        <label for="loginPass">Mot de passe</label>
        <input type="password" id="loginPass" placeholder="••••••••" />
      </div>
      
      <button class="auth-btn" onclick="doLogin()">Connexion</button>
      
      <p style="text-align: center; margin-top: 15px; font-size: 0.9em; color: var(--rose-lt); cursor: pointer;" onclick="toggleAuthView('signup')">
        Pas encore de compte ? <b>S'inscrire</b>
      </p>
    </div>

    <div id="signupView" style="display: none;">
      <div class="auth-field">
        <label for="signupEmail">Email *</label>
        <input type="email" id="signupEmail" placeholder="exemple@mail.com" />
      </div>
      <div class="auth-field">
        <label for="signupPass">Mot de passe *</label>
        <input type="password" id="signupPass" placeholder="••••••••" />
      </div>
      <div class="auth-field">
        <label for="signupPseudo">Pseudo *</label>
        <input type="text" id="signupPseudo" placeholder="Ton pseudo" />
      </div>
      <div class="auth-field">
        <label for="signupNom">Nom</label>
        <input type="text" id="signupNom" placeholder="Ton nom" />
      </div>
      <div class="auth-field">
        <label for="signupPrenom">Prénom</label>
        <input type="text" id="signupPrenom" placeholder="Ton prénom" />
      </div>
      <div class="auth-field">
        <label for="signupDate">Date de naissance</label>
        <input type="date" id="signupDate" />
      </div>
      
      <button class="auth-btn" onclick="doSignup()" style="background: var(--blue);">Valider l'inscription</button>
      
      <p style="text-align: center; margin-top: 15px; font-size: 0.9em; color: var(--rose-lt); cursor: pointer;" onclick="toggleAuthView('login')">
        Déjà un compte ? <b>Se connecter</b>
      </p>
    </div>

  </div>
</div>

<!-- JS modules — order matters (dependencies first) -->
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
<script src="js/assets.js"></script>
<script src="js/ui.js"></script>
<script src="js/optimization.js"></script>
<script src="js/charts/frontier.js"></script>
<script src="js/charts/cml.js"></script>
<script src="js/charts/risk.js"></script>
<script src="js/charts/correlation.js"></script>
<script src="js/panels/articles.js"></script>
<script src="js/panels/portfolios.js"></script>
<script src="js/data/articles.js"></script>
<script src="js/app.js"></script>
</body>
</html>
